<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

<div class="container">

    <h1 class="header_text">I AM SORRY ❤️</h1>

<p id="text" class="love_text"></p>

    <button class="btn" onclick="goBack()">Back</button>

</div>

<script>
const messages = [
    "I know I hurt you sometimes, but you are really special to me 🥺❤️",
    "I never want to see you sad, I genuinely care about you a lot 🥺",
    "I promise to keep you the happiest always, you mean everything to me 🫶🏻",
    "I will be a better man for you, someone who will love you forever ❤️",
    "ILOVEYOU MERA BACHA 🧿🫀"
];

let i = 0;
let j = 0;

function typeText() {
    const textBox = document.getElementById("text");

    if (i < messages.length) {
        if (j < messages[i].length) {
            textBox.innerHTML += messages[i][j];
            j++;
            setTimeout(typeText, 40);
        } else {
            textBox.innerHTML += "<br><br>";
            i++;
            j = 0;
            setTimeout(typeText, 500);
        }
    }
}

typeText();

function goBack() {
    window.location.href = "yes.html";
}
</script>

</body>
</html>
