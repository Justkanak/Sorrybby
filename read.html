<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

<div class="container">

    <h1 class="header_text">I AM SORRY ❤️</h1>

    <p id="text"></p>

    <button class="btn" onclick="goBack()">Back</button>

</div>

<script>
const message = "I know i do hurt you a lot sometime but you are really special to me🥺❤️",
    "I never want to see you sad, I genuinely care about you a lot🥺",
    "I promise to keep you the happiest always, you mean everything to me",
    "I will me a better man for you, a man who will love you forever🫶🏻",
    "ILOVEYOU MERA BACHA🧿🫀";

let i = 0;

function typeText() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message[i];
        i++;
        setTimeout(typeText, 40);
    }
}

typeText();

function goBack() {
    window.location.href = "yes.html";
}
</script>

</body>
</html>
